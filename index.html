<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>進化素材一覧</title>

<style>
body{
  font-family:sans-serif;
  padding:20px;
  background:#f7f7f7;
  color:#222;
}

.top-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  flex-wrap:wrap;
  margin-bottom:12px;
}

h1{
  font-size:26px;
  margin:0;
}

.controls{
  display:flex;
  flex-direction:column;
  gap:8px;
  margin-bottom:15px;
}

.control-row{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  align-items:center;
}

input,
select{
  font-size:16px;
  padding:10px;
  border-radius:8px;
  border:1px solid #ccc;
}

.search-input{
  width:170px;
}

button{
  font-size:14px;
  padding:8px 10px;
  border:none;
  border-radius:8px;
  background:#555;
  color:white;
  cursor:pointer;
}

.account-area{
  display:flex;
  align-items:center;
  gap:8px;
  flex-wrap:wrap;
  padding:10px 12px;
  background:#f5f5f5;
  border:1px solid #ddd;
  border-radius:14px;
}

.summary,
.card{
  background:white;
  border-radius:10px;
  padding:12px 16px;
  margin-bottom:12px;
  box-shadow:0 1px 6px rgba(0,0,0,.08);
}

.summary-title{
  font-weight:bold;
  margin-bottom:6px;
}

.summary-list{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
}

.summary-item{
  display:flex;
  align-items:center;
  gap:5px;
  background:#f1f1f1;
  border-radius:8px;
  padding:5px 8px;
  font-size:14px;
}

.summary-img{
  width:28px;
  height:28px;
  object-fit:contain;
}

.count{
  margin-bottom:10px;
  color:#555;
}

.card{
  position:relative;
}

.evolution{
  display:flex;
  gap:12px;
  align-items:flex-start;
  padding:8px 0;
  border-bottom:1px solid #eee;
}

.evolution:last-child{
  border-bottom:none;
}

.char-img{
  width:72px;
  height:72px;
  object-fit:contain;
  flex-shrink:0;
}

.name{
  font-size:19px;
  font-weight:bold;
  margin-bottom:4px;
  padding-right:35px;
}

.meta{
  color:#666;
  font-size:14px;
  margin-bottom:6px;
}

.material-row{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin-top:8px;
}

.material{
  width:72px;
  background:#f1f1f1;
  border-radius:9px;
  padding:7px;
  text-align:center;
  box-sizing:border-box;
}

.material.hit{
  border:3px solid #ff3b30;
}

.material-img{
  width:42px;
  height:42px;
  object-fit:contain;
  display:block;
  margin:0 auto 4px;
}

.material-count{
  margin-top:3px;
  font-size:13px;
  color:#666;
  font-weight:bold;
}

.done-button{
  margin-top:4px;
  background:#4CAF50;
}

.done-button.done{
  background:#999;
}

.empty{
  color:#999;
}

#starFilterButton.star-filter-on{
  background:#f9a825;
}

#fourthOnlyBtn.fourth-on{
  background:#ff9800;
}

#newFilterButton{
  font-size:15px;
  padding:8px 12px;
  border:none;
  border-radius:8px;
  background:#666;
  color:white;
  cursor:pointer;
}

#newFilterButton.new-filter-on{
  background:#ff3b30;
}

#verSortButton{
  font-size:15px;
  padding:8px 12px;
  border:none;
  border-radius:8px;
  background:#666;
  color:white;
  cursor:pointer;
}

#verSortButton.ver-sort-on{
  background:#2196F3;
}

.new-badge{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  margin-left:6px;
  padding:3px 8px;
  border-radius:8px;
  background:#ff3b30;
  color:white;
  font-size:13px;
  font-weight:bold;
  line-height:1;
}

.evolve-ver-badge{
  position:absolute;
  top:10px;
  right:16px;
  background:#2196F3;
  color:white;
  font-size:14px;
  font-weight:bold;
  padding:6px 10px;
  border-radius:8px;
  box-shadow:0 2px 6px rgba(0,0,0,.2);
}

.summary-group{
  margin-bottom:10px;
}

.summary-title{
  display:flex;
  align-items:center;
  justify-content:space-between;
  cursor:pointer;
  user-select:none;
}

.summary-title::after{
  content:"▼";
  font-size:12px;
  color:#666;
}

.summary-group.closed .summary-title::after{
  content:"▶";
}

.summary-group.closed .summary-content{
  display:none;
}

.tools-link-button{
  display:flex;
  align-items:center;
  justify-content:center;
  padding:8px 10px;
  font-size:14px;
  font-weight:bold;
  color:#555;
  text-decoration:none;
  background:white;
  border:1px solid #ccc;
  border-radius:8px;
}

#topButton{
  position:fixed;
  right:18px;
  bottom:18px;
  width:52px;
  height:52px;
  border:none;
  border-radius:50%;
  background:#4CAF50;
  color:white;
  font-size:24px;
  font-weight:bold;
  box-shadow:0 3px 10px rgba(0,0,0,.25);
  z-index:9999;
}

@media (max-width:600px){

  body{
    padding:3px;
  }

  .top-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:4px;
    flex-wrap:nowrap;
    margin-bottom:3px;
  }

  h1{
    font-size:13px;
    line-height:1;
    margin:0;
    white-space:nowrap;
    flex-shrink:0;
  }

  .account-area{
    margin-left:auto;
    display:flex;
    align-items:center;
    gap:2px;
    flex-wrap:nowrap;
    padding:2px;
    border-radius:7px;
    max-width:none;
  }

  .account-area select{
    width:64px;
    height:20px;
    font-size:8px;
    padding:1px 3px;
  }

  .account-area button{
    height:20px;
    font-size:7px;
    padding:1px 3px;
    border-radius:5px;
    white-space:nowrap;
  }

  .controls{
    gap:3px;
    margin-bottom:4px;
  }

  .control-row{
    display:flex;
    align-items:center;
    flex-wrap:nowrap;
    gap:3px;
  }

  .second-row{
    justify-content:flex-start;
  }

  .search-input{
    flex:1;
    min-width:0;
    height:22px;
    font-size:9px;
    padding:2px 5px;
    box-sizing:border-box;
  }

  .control-row button,
  .control-row select,
  .tools-link-button{
    flex-shrink:0;
    height:22px;
    font-size:9px;
    padding:1px 5px;
    border-radius:5px;
    box-sizing:border-box;
    white-space:nowrap;
  }

  #rarityFilter{
    width:82px;
  }

  #newFilterButton,
  #verSortButton{
    height:22px;
    font-size:8px;
    padding:0 5px;
    border-radius:5px;
  }

  .summary{
    padding:4px;
    margin-bottom:4px;
    border-radius:8px;
  }

  .summary-title{
    font-size:10px;
    margin-bottom:2px;
  }

  .summary-list{
    gap:2px;
    margin-bottom:4px !important;
  }

  .summary-item{
    padding:1px 3px;
    gap:1px;
    border-radius:4px;
    font-size:8px;
  }

  .summary-img{
    width:14px;
    height:14px;
  }

  .count{
    font-size:10px;
    margin-bottom:3px;
  }

  .card{
    padding:4px 5px;
    margin-bottom:4px;
    border-radius:8px;
  }

  .evolution{
    gap:4px;
    padding:0;
    align-items:flex-start;
  }

  .evolution > div{
    flex:1;
    min-width:0;
  }

  .char-img{
    width:36px;
    height:36px;
  }

  .meta{
    font-size:8px;
    margin-bottom:0;
  }

  .name{
    font-size:11px;
    line-height:1;
    margin-bottom:0;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }

  .done-button{
    font-size:7px;
    padding:1px 4px;
    border-radius:4px;
    margin-top:1px;
  }

  .material-row{
    display:flex;
    flex-wrap:wrap;
    gap:1px;
    margin-top:1px;
  }

  .material{
    width:30px;
    min-width:30px;
    padding:1px;
    border-radius:4px;
  }

  .material-img{
    width:15px;
    height:15px;
    margin-bottom:0;
  }

  .material-count{
    font-size:7px;
    line-height:1;
    margin-top:0;
  }

  .new-badge{
    margin-left:2px;
    padding:0 3px;
    border-radius:4px;
    font-size:6px;
    line-height:1;
  }

  .evolve-ver-badge{
    top:4px;
    right:6px;
    font-size:7px;
    padding:2px 4px;
    border-radius:4px;
  }

  #topButton{
    width:36px;
    height:36px;
    font-size:16px;
    right:6px;
    bottom:6px;
  }
}
</style>
</head>

<body>

<div class="top-header">

  <h1>進化素材一覧　ver.15.4.0対応</h1>

  <div class="account-area">
    <select id="accountSelect" onchange="changeAccount()"></select>

    <button onclick="addAccount()">
      アカウント追加
    </button>

    <button onclick="renameAccount()">
      名前変更
    </button>
  </div>

</div>

<div class="controls">

  <div class="control-row">
    <input id="charSearchInput" class="search-input" placeholder="キャラ名で検索">

    <input id="materialSearchInput" class="search-input" placeholder="素材名で検索">

    <button id="starFilterButton" onclick="toggleStarFilter()">
      未進化
    </button>

    <select id="rarityFilter">
      <option value="">全レアリティ</option>
    </select>

    <button id="fourthOnlyBtn">
      第四のみ
    </button>
  </div>

  <div class="control-row second-row">
    <button id="newFilterButton" onclick="toggleNewFilter()">
      NEWのみ
    </button>

    <button id="verSortButton" onclick="toggleVerSort()">
      Verソート
    </button>
  </div>

</div>

<div id="summary" class="summary"></div>

<div id="countText" class="count"></div>

<div id="list"></div>

<button id="topButton" onclick="scrollToTop()">↑</button>

<script>
let characters = [];
let imageData = {};
let filteredCharacters = [];
let starFilterOnly = false;
let fourthOnly = false;
let newFilterOnly = false;
let verSortOn = false;
const SUMMARY_STATE_KEY =
  "nyanko_summary_state";

Promise.all([
  fetch("materials.json").then(r => r.json()),
  fetch("image.json").then(r => r.json())
])

.then(([materials, images]) => {

  characters = materials;
  imageData = images;

  setupRarityFilter();
  renderAccountSelect();
  renderList();
})

.catch(err => {

  document.getElementById("list").innerHTML =
    "<p class='empty'>JSONを読み込めませんでした。</p>";

  console.error(err);
});

document.getElementById("charSearchInput")
  .addEventListener("input", renderList);

document.getElementById("materialSearchInput")
  .addEventListener("input", renderList);

document.getElementById("rarityFilter")
  .addEventListener("change", renderList);

document
  .getElementById("fourthOnlyBtn")
  .addEventListener("click", () => {

    fourthOnly = !fourthOnly;

    document
      .getElementById("fourthOnlyBtn")
      .classList.toggle(
      "fourth-on",
      fourthOnly
    );
    
    renderList();
  });

function renderList(){

  const list =
    document.getElementById("list");

  list.innerHTML = "";

  const charSearch =
    normalizeText(
      document.getElementById("charSearchInput").value
    );

  const materialSearch =
    normalizeText(
      document.getElementById("materialSearchInput").value
    );

  const rarity =
    document.getElementById("rarityFilter").value;

  // 合計数はレアリティだけ反映
  updateSummary(getSummaryTargetCharacters());

  filteredCharacters = characters.filter(char => {

    if (
      rarity &&
      char["レアリティ"] !== rarity
    ) {
      return false;
    }

    const charText =
      normalizeText([
        char["ID"],
        char["レアリティ"],
        ...(char["進化"] || [])
          .map(e => e["キャラ名"])
      ].join(" "));

    const materialText =
      normalizeText(
        (char["進化"] || [])
          .flatMap(e => e["素材"] || [])
          .map(m => m["名前"])
          .join(" ")
      );

    if (
      charSearch &&
      !charText.includes(charSearch)
    ) {
      return false;
    }

    if (
      materialSearch &&
      !materialText.includes(materialSearch)
    ) {
      return false;
    }

    const evolutionsToShow =
      getEvolutionsToShow(char);

    return evolutionsToShow.length > 0;
  });

  if(verSortOn){
  filteredCharacters.sort((a, b) => {
    return compareVersion(
      getSortVersion(a),
      getSortVersion(b)
    );
  });
}

  document.getElementById("countText")
    .textContent =
      `${filteredCharacters.length}件表示`;

  if (filteredCharacters.length === 0) {

    list.innerHTML =
      "<p class='empty'>該当するキャラがありません。</p>";

    return;
  }

  filteredCharacters.forEach(char => {

    const evolutionsToShow =
      getEvolutionsToShow(char);

    const card =
      document.createElement("div");

    card.className = "card";

    card.innerHTML = `
      ${evolutionsToShow
        .map(({ evo, index }) =>
          makeEvolutionHtml(
            char,
            evo,
            index,
            materialSearch
          )
        )
        .join("")
      }
    `;

    list.appendChild(card);
  });
}

  function getEvolutionsToShow(char){

  return (char["進化"] || [])
    .map((evo, index) => ({
      evo,
      index
    }))
    .filter(({ evo, index }) => {

      if (
        fourthOnly &&
        index !== 1
      ) {
        return false;
      }

      if (starFilterOnly) {
        const key =
          makeEvolutionKey(char, index);

        return !isEvolutionDone(key);
      }

      if(
        newFilterOnly &&
        !isNewEvolution(evo)
      ){
        return false;
      }

      return true;
    });
}
  
  function getSummaryTargetCharacters(){

  const rarity =
    document.getElementById("rarityFilter").value;

  return characters.filter(char => {

    if (
      rarity &&
      char["レアリティ"] !== rarity
    ) {
      return false;
    }

    return true;
  });
}

function makeEvolutionHtml(
  char,
  evo,
  index,
  materialSearch
){

  const key =
    makeEvolutionKey(char, index);

  const done =
    isEvolutionDone(key);

  return `
    <div class="evolution">

    ${evo["進化Ver"] ? `
      <div class="evolve-ver-badge">
        進化Ver:${escapeHtml(evo["進化Ver"])}
      </div>
    ` : ""}

      <img
        class="char-img"

        src="${escapeHtml(evo["画像名"])}"

        onerror="
          this.src='image/noimage.png'
        "
      >

      <div>

        <div class="name">
          ${escapeHtml(evo["キャラ名"])}

          ${
            isNewEvolution(evo)
              ? `<span class="new-badge">NEW</span>`
              : ""
          }
        </div>

        <button
          class="
            done-button
            ${done ? "done" : ""}
          "

          onclick="
            toggleEvolutionDone(
              '${escapeAttr(key)}'
            )
          "
        >
          ${
            done
              ? "進化済み"
              : "未進化"
          }
        </button>

        <div class="material-row">

          ${(evo["素材"] || [])
            .map(m => {

              const hit =
                materialSearch &&
                normalizeText(m["名前"])
                  .includes(materialSearch);

              return `
                <div
                  class="
                    material
                    ${hit ? "hit" : ""}
                  "
                >

                  <img
                    class="material-img"

                    src="
                      ${escapeHtml(
                        getMaterialImage(
                          m["名前"]
                        )
                      )}
                    "

                    onerror="
                      this.src='image/noimage.png'
                    "
                  >

                  <div class="material-count">
                    ×${escapeHtml(m["個数"])}
                  </div>

                </div>
              `;
            })
            .join("")
          }

        </div>

      </div>

    </div>
  `;
}

function updateSummary(targetCharacters){

  const rarity =
    document.getElementById("rarityFilter").value;

  const rarityText =
    rarity ? `（${escapeHtml(rarity)}）` : "";

  const total = {};
  const remaining = {};

  targetCharacters.forEach(char => {

    (char["進化"] || []).forEach((evo, index) => {

      const key =
        makeEvolutionKey(char, index);

      const done =
        isEvolutionDone(key);

      (evo["素材"] || []).forEach(m => {

        const count =
          Number(m["個数"]) || 0;

        total[m["名前"]] =
          (total[m["名前"]] || 0)
          + count;

        if(!done){

          remaining[m["名前"]] =
            (remaining[m["名前"]] || 0)
            + count;
        }
      });
    });
  });

  document.getElementById("summary").innerHTML = `

    <div
      class="
        summary-group
        ${loadSummaryState().total ? "closed" : ""}
      "
      data-key="total"
    >

      <div
        class="summary-title"
        onclick="toggleSummary(this)"
      >
        必要素材合計${rarityText}
      </div>

      <div class="summary-content">
        ${makeSummaryItems(total)}
      </div>

    </div>

    <div
      class="
        summary-group
        ${loadSummaryState().remaining ? "closed" : ""}
      "
      data-key="remaining"
    >

      <div
        class="summary-title"
        onclick="toggleSummary(this)"
      >
        未進化分の必要素材${rarityText}
      </div>

      <div class="summary-content">
        ${makeSummaryItems(remaining)}
      </div>

    </div>
  `;
}

  function toggleSummary(el){

  const group =
    el.parentElement;

  group.classList.toggle("closed");

  const state =
    loadSummaryState();

  const key =
    group.dataset.key;

  state[key] =
    group.classList.contains("closed");

  saveSummaryState(state);
}
  
function makeSummaryItems(obj){

  const materialOrder =
    Object.keys(imageData);

  const entries =
    materialOrder
      .filter(name => obj[name])
      .map(name => [name, obj[name]]);

  const extraEntries =
    Object.entries(obj)
      .filter(([name]) => !imageData[name]);

  const allEntries = [
    ...entries,
    ...extraEntries
  ];

  if (allEntries.length === 0) {
    return `
      <span class="empty">
        なし
      </span>
    `;
  }

  let html = "";
  let currentGroup = null;

  allEntries.forEach(([name, count]) => {

    let group = "";

    // 順番重要
    if (name.includes("獣結晶")) {
      group = "獣結晶";
    }
    else if (name.includes("獣石")) {
      group = "獣石";
    }
    else if (name.includes("マタタビの種")) {
      group = "種";
    }
    else if (name.includes("マタタビ")) {
      group = "マタタビ";
    }

    // グループ切替
    if (group !== currentGroup) {

      // 前グループ閉じる
      if (currentGroup !== null) {
        html += `</div>`;
      }

      // 新グループ開始
      html += `
        <div
          class="summary-list"
          style="margin-bottom:10px;"
        >
      `;

      currentGroup = group;
    }

    html += `
      <div class="summary-item">

        <img
          class="summary-img"
          src="${escapeHtml(getMaterialImage(name))}"
          onerror="this.src='image/noimage.png'"
        >

        <span>
          ×${count}
        </span>

      </div>
    `;
  });

  // 最後閉じる
  html += `</div>`;

  return html;
}
  
function getMaterialImage(name){

  const data =
    imageData[name];

  if (typeof data === "string") {
    return data;
  }

  if (data && data["画像名"]) {
    return data["画像名"];
  }

  return "image/noimage.png";
}

function setupRarityFilter(){

  const select =
    document.getElementById("rarityFilter");

  const rarities =
    [...new Set(

      characters
        .map(c => c["レアリティ"])
        .filter(Boolean)

    )];

  rarities.forEach(rarity => {

    const option =
      document.createElement("option");

    option.value = rarity;
    option.textContent = rarity;

    select.appendChild(option);
  });
}

function makeEvolutionKey(char, index){
  const evo = char["進化"][index];
  return `${char["ID"]}_${evo["キャラ名"]}_${index}`;
}

function loadDoneData(){

  try {

    return JSON.parse(
      localStorage.getItem(
        getDoneSaveKey()
      )
    ) || {};

  } catch {

    return {};
  }
}

function saveDoneData(data){

  localStorage.setItem(
    getDoneSaveKey(),
    JSON.stringify(data)
  );
}

function isEvolutionDone(key){

  return !!loadDoneData()[key];
}

function toggleEvolutionDone(key){

  const data =
    loadDoneData();

  if (data[key]) {

    delete data[key];

  } else {

    data[key] = true;
  }

  saveDoneData(data);

  renderList();
}

const ACCOUNT_LIST_KEY =
  "nyanko_evolution_accounts";

const CURRENT_ACCOUNT_KEY =
  "nyanko_evolution_current_account";

initAccounts();

function getCurrentAccountId(){

  return localStorage.getItem(
    CURRENT_ACCOUNT_KEY
  ) || "account_1";
}

function getDoneSaveKey(){

  return `
    nyanko_evolution_done_
    ${getCurrentAccountId()}
  `;
}

function getStarSaveKey(){

  return `
    nyanko_evolution_star_
    ${getCurrentAccountId()}
  `;
}

function loadAccounts(){

  try {

    return JSON.parse(
      localStorage.getItem(
        ACCOUNT_LIST_KEY
      )
    ) || [];

  } catch {

    return [];
  }
}

function saveAccounts(accounts){

  localStorage.setItem(
    ACCOUNT_LIST_KEY,
    JSON.stringify(accounts)
  );
}

function initAccounts(){

  let accounts =
    loadAccounts();

  if (accounts.length === 0) {

    accounts = [

      {
        id:"account_1",
        name:"アカウント1"
      },

      {
        id:"account_2",
        name:"アカウント2"
      }
    ];

    saveAccounts(accounts);

    localStorage.setItem(
      CURRENT_ACCOUNT_KEY,
      "account_1"
    );
  }
}

function renderAccountSelect(){

  const select =
    document.getElementById(
      "accountSelect"
    );

  if (!select) return;

  const accounts =
    loadAccounts();

  const currentId =
    getCurrentAccountId();

  select.innerHTML = "";

  accounts.forEach(account => {

    const option =
      document.createElement("option");

    option.value = account.id;
    option.textContent = account.name;

    option.selected =
      account.id === currentId;

    select.appendChild(option);
  });
}

function changeAccount(){

  const select =
    document.getElementById(
      "accountSelect"
    );

  localStorage.setItem(
    CURRENT_ACCOUNT_KEY,
    select.value
  );

  renderList();
}

function addAccount(){

  const accounts =
    loadAccounts();

  const name = prompt(
    "追加するアカウント名を入力してください",

    `アカウント${accounts.length + 1}`
  );

  if (!name) return;

  const id =
    `account_${Date.now()}`;

  accounts.push({
    id,
    name
  });

  saveAccounts(accounts);

  localStorage.setItem(
    CURRENT_ACCOUNT_KEY,
    id
  );

  renderAccountSelect();
  renderList();
}

function renameAccount(){

  const accounts =
    loadAccounts();

  const currentId =
    getCurrentAccountId();

  const account =
    accounts.find(
      a => a.id === currentId
    );

  if (!account) return;

  const name = prompt(
    "アカウント名を変更してください",
    account.name
  );

  if (!name) return;

  account.name = name;

  saveAccounts(accounts);

  renderAccountSelect();
}

function loadStarCharacters(){

  try {

    return JSON.parse(
      localStorage.getItem(
        getStarSaveKey()
      )
    ) || {};

  } catch {

    return {};
  }
}

function saveStarCharacters(data){

  localStorage.setItem(
    getStarSaveKey(),
    JSON.stringify(data)
  );
}

function makeCharacterStarKey(char){

  return `${char["ID"]}`;
}

function isCharacterStarred(char){

  return !!loadStarCharacters()[
    makeCharacterStarKey(char)
  ];
}

function toggleCharacterStar(id){

  const char =
    characters.find(
      c => String(c["ID"])
      === String(id)
    );

  if (!char) return;

  const data =
    loadStarCharacters();

  const key =
    makeCharacterStarKey(char);

  if (data[key]) {

    delete data[key];

  } else {

    data[key] = true;
  }

  saveStarCharacters(data);

  renderList();
}

function toggleStarFilter(){

  starFilterOnly = !starFilterOnly;

  const button =
    document.getElementById(
      "starFilterButton"
    );

  button.classList.toggle(
    "star-filter-on",
    starFilterOnly
  );

  button.textContent =
    starFilterOnly
      ? "未進化のみ"
      : "未進化";

  renderList();
}

  function toggleFourthOnly(){

  fourthOnly = !fourthOnly;

  const button =
    document.getElementById("fourthOnlyBtn");

  button.classList.toggle(
    "fourth-on",
    fourthOnly
  );

  button.textContent =
    fourthOnly
      ? "第四のみ"
      : "第四のみ";

}

function normalizeText(text){

  return String(text ?? "")

    .normalize("NFKC")

    .replace(
      /[\u30A1-\u30F6]/g,

      ch =>
        String.fromCharCode(
          ch.charCodeAt(0) - 0x60
        )
    )

    .toLowerCase()

    .replace(/\s+/g, "")

    .replace(
      /[‐-‒–—―ー]/g,
      "-"
    );
}

function escapeHtml(text){

  return String(text ?? "")

    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#039;");
}

function escapeAttr(text){

  return escapeHtml(text);
}

function scrollToTop(){

  window.scrollTo({
    top:0,
    behavior:"smooth"
  });
}

  function loadSummaryState(){

  try{

    return JSON.parse(
      localStorage.getItem(
        SUMMARY_STATE_KEY
      )
    ) || {};

  }catch{

    return {};
  }
}

function saveSummaryState(state){

  localStorage.setItem(

    JSON.stringify(state)
  );
}

  function parseVersion(ver){
  return String(ver ?? "")
    .split(".")
    .map(v => Number(v) || 0);
}

function compareVersion(a, b){
  const av = parseVersion(a);
  const bv = parseVersion(b);

  const len = Math.max(av.length, bv.length);

  for(let i = 0; i < len; i++){
    const x = av[i] || 0;
    const y = bv[i] || 0;

    if(x !== y){
      return x - y;
    }
  }

  return 0;
}

// Ver
function getSortVersion(char){
  const evolutions = getEvolutionsToShow(char);

  if(evolutions.length === 0){
    return "";
  }

  return evolutions
    .map(({ evo }) => evo["進化Ver"] || "")
    .filter(v => v !== "")
    .sort(compareVersion)[0] || "";
}

  function toggleVerSort(){

  verSortOn = !verSortOn;

  const button =
    document.getElementById("verSortButton");

  button.classList.toggle(
    "ver-sort-on",
    verSortOn
  );

  renderList();
}

  // NEW
  function getLatestEvolutionVersion(){

  let latest = "";

  characters.forEach(char => {
    (char["進化"] || []).forEach(evo => {
      const ver = evo["進化Ver"];

      if (!ver) return;

      if (
        !latest ||
        compareVersion(ver, latest) > 0
      ) {
        latest = ver;
      }
    });
  });

  return latest;
}

function isNewEvolution(evo){

  const latestVer =
    getLatestEvolutionVersion();

  if (!latestVer) {
    return false;
  }

  return compareVersion(
    evo["進化Ver"],
    latestVer
  ) === 0;
}

  function toggleNewFilter(){

  newFilterOnly = !newFilterOnly;

  const button =
    document.getElementById("newFilterButton");

  button.classList.toggle(
    "new-filter-on",
    newFilterOnly
  );

  renderList();
}
